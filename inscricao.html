<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição</title>
</head>
<body>
    <fieldset>
        <h1>Iscrição / Contato</h1>
        <h4>Preencha os campos abaixo. Campos marcados com * são obrigatórios.</h4>
      
        <form action="" method="post">

        <legend><strong></strong></legend>
  
        <div class="campo-grupo">
          <div class="campo">
            <label for="nome_aluno">Nome</label>
            <input type="text" id="nome" name="nome" required>
          </div>
          <div class="campo">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" name="sobrenome">
          </div>
        </div>
  
        <div class="campo-grupo">
          <div class="campo">
            <label for="email">E-Mail</label>
            <input type="text" id="email" name="email">
          </div>
          <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" maxlength="15" placeholder="(61) 9 9999-9999">
          </div>
        </div>
  
        <div class="campo-grupo">
            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000.00">
              </div>  
          <div class="campo">
            <label for="nascimento">Data de Nascimento</label>
            <input type="date" id="nascimento" name="nascimento">
          </div>
        </div>
        
        <div class="campo-grupo">
          <div class="campo">
            <label for="cpf">Senha</label>
            <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="Mínimo 6 caracteres">
          </div>
          <div class="campo">
            <label for="matricula">Função</label>
            <select id="estado" name="estado">
              <option value="">Escolha...</option>
              <option value="">Professor</option>
              <option value="2ano">Técnico</option>
              <option value="3ano">Diretor</option>
            </select>
          </div>
        </div>

        <div class="campo-grupo">
          <div class="campo">
            <label for="usuário">Usuário</label>
            <span>@</span>
            <input type="text" id="usuário" name="usuário" maxlength="15" placeholder="000.000.000-00">
          </div>
          <div class="campo">
            <label for="idade">Mensagem</label>
            <input type="text" id="mensagem" name="mensagem" maxlength="15" placeholder="Escreva aqui...">
          </div>
        </div>

        <div class="campo-grupo">
          <div class="campo">
            <label for="curriculo">Upload de Curriculo(PDF)</label>
            <input type="text" id="mensagem" name="mensagem" maxlength="15" placeholder="Escolher arquivo">
            <input type="text" id="mensagem" name="mensagem" maxlength="15" placeholder="Nenhum arquivo escolhido">
            <span>Máx 5MB. Apenas PDF.</span>
          </div>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <label>Quero receber novidades</label>
                <input type="checkbox" id="novidade" nome="novidade">
            </div>
            <div class="checkbox-item"></div>
                <label>Quero receber por email</label>
                <input type="checkbox">
            </div>
            <div class="checkbox-item">
                <label>Contato por telefone</label>
                <input type="checkbox">
            </div>
        </div>

           </checkbox>
        </div>
  
      </fieldset>

      <script src="script1.js"></script>
</body>
</html>
