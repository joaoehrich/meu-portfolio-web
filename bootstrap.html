<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <h1>Inscrição / Contato</h1>
      <h4>Preencha os campos abaixo. Campos marcados com * são obrigatórios.</h4>

      <form action="" method="post">
        <fieldset>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label" for="nome">Nome *</label>
              <input type="text" class="form-control" id="nome" name="nome" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="sobrenome">Sobrenome</label>
              <input type="text" class="form-control" id="sobrenome" name="sobrenome">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label" for="email">Email *</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="telefone">Telefone</label>
              <input type="text" class="form-control" id="telefone" name="telefone">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label" for="cpf">CPF *</label>
              <input type="text" class="form-control" id="cpf" name="cpf" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="data">Data de Nascimento</label>
              <input type="text" class="form-control" id="data" name="data" placeholder="dd/mm/aaaa">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label" for="senha">Senha *</label>
              <input type="password" class="form-control" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="funcao">Função</label>
              <select class="form-select" id="funcao" name="funcao">
                <option value="">Escolha...</option>
                <option value="professor">Professor</option>
                <option value="tecnico">Técnico</option>
                <option value="diretor">Diretor</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="usuario">Usuário *</label>
            <div class="input-group">
              <span class="input-group-text">@</span>
              <input type="text" class="form-control" id="usuario" name="usuario" placeholder="nomeusuario" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="mensagem">Mensagem</label>
            <textarea class="form-control" id="mensagem" name="mensagem" rows="4" placeholder="Escreva aqui..."></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label" for="curriculo">Upload de Currículo (PDF)</label>
            <input type="file" class="form-control" id="curriculo" name="curriculo" accept=".pdf">
            <small class="text-muted">Máx 5MB. Apenas PDF.</small>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <input type="radio" name="contato" id="novidades">
              <label for="novidades">Quero receber novidades</label>
            </div>
            <div class="col-md-4">
              <input type="radio" name="contato" id="contato_email">
              <label for="contato_email">Contato por email</label>
            </div>
            <div class="col-md-4">
              <input type="radio" name="contato" id="contato_telefone">
              <label for="contato_telefone">Contato por telefone</label>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Enviar</button>
            <button type="reset" class="btn btn-secondary">Limpar</button>
          </div>
        </fieldset>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
